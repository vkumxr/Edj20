<!DOCTYPE html>
<html>

<head>

    <title>ESP32 WiFi Dashboard</title>

    <style>

        body{
            background:#121212;
            color:white;
            font-family:Arial;
            text-align:center;
            padding-top:50px;
        }

        .card{
            width:400px;
            margin:auto;
            background:#1f1f1f;
            padding:20px;
            border-radius:10px;
        }

        button{
            width:220px;
            padding:12px;
            margin:10px;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        #status{
            margin-top:20px;
            font-size:22px;
        }

    </style>

</head>

<body>

    <div class="card">

        <h1>ESP32 Dashboard</h1>

        <button onclick="apMode()">
            AP Mode
        </button>

        <br>

        <button onclick="staMode()">
            STA Mode
        </button>

        <br>

        <button onclick="apstaMode()">
            AP + STA Mode
        </button>

        <div id="status">
    		Waiting...
		</div>

		<div id="logs"
			style="
			margin-top:20px;
			background:black;
			padding:10px;
			height:150px;
			overflow:auto;
			text-align:left;
			font-family:monospace;
			font-size:14px;
			border-radius:5px;
			">
		</div>

    </div>

    <script>

    function addLog(text){

        let logs = document.getElementById("logs");

        logs.innerHTML += text + "<br>";

        logs.scrollTop = logs.scrollHeight;
    }

    async function apMode(){

        document.getElementById("status").innerHTML =
        "Starting AP Mode...";

        addLog("Initializing SoftAP...");
        addLog("SSID: Edj20_AP");

        await delay(1000);

        addLog("AP Started Successfully");
        addLog("IP: 192.168.4.1");

        document.getElementById("status").innerHTML =
        "AP Mode Active";
    }

    async function staMode(){

        document.getElementById("status").innerHTML =
        "Starting STA Mode...";

        addLog("Connecting to Factory_WiFi");

        await delay(1500);

        addLog("Connected Successfully");
        addLog("IP: 192.168.1.25");

        document.getElementById("status").innerHTML =
        "STA Mode Active";
    }

    async function apstaMode(){

        document.getElementById("status").innerHTML =
        "Starting AP+STA Mode...";

        addLog("Starting AP Interface...");

        await delay(1000);

        addLog("SoftAP Ready");
        addLog("SSID: Edj20_AP");

        await delay(1000);

        addLog("Connecting STA to Factory_WiFi");

        await delay(1500);

        addLog("STA Connected");
        addLog("STA IP: 192.168.1.50");
        addLog("AP IP: 192.168.4.1");

        document.getElementById("status").innerHTML =
        "AP+STA Mode Active";
    }

    function delay(ms){

        return new Promise(resolve => setTimeout(resolve, ms));
    }
    </script>

</body>

</html>
